<article class="project-card" data-language="<%= project.language %>">
  <div class="project-card-inner">
    <div class="project-card-top">
      <h2 class="project-name">
        <a href="<%= project.githubUrl %>" target="_blank" rel="noopener">
          <%= project.fullName %>
        </a>
      </h2>
      <% if (project.stars !== null && project.stars !== undefined) { %>
        <span class="star-badge" title="<%= project.stars.toLocaleString() %> stars">
          <svg class="star-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <%= formatStars(project.stars) %>
        </span>
      <% } %>
    </div>
    <p class="project-description"><%= project.description %></p>
    <div class="project-meta">
      <span class="project-lang-tag"><%= project.language %></span>
      <a href="/issues/<%= project.issueNumber %>.html" class="project-issue-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        第<%= project.issueNumber %>期
      </a>
    </div>
  </div>
</article>
