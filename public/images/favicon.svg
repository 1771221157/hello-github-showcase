<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Gateway portal shape -->
  <rect x="18" y="10" width="64" height="80" rx="12" fill="none" stroke="url(#g)" stroke-width="3" filter="url(#glow)"/>
  <rect x="30" y="22" width="40" height="56" rx="8" fill="rgba(0,229,255,0.06)" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Inner code symbol -->
  <text x="50" y="58" text-anchor="middle" font-family="monospace" font-size="24" font-weight="900" fill="url(#g)" filter="url(#glow)">&lt;/&gt;</text>
  <!-- Top accent dots -->
  <circle cx="38" cy="19" r="3" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="62" cy="19" r="3" fill="#a855f7" filter="url(#glow)"/>
</svg>
